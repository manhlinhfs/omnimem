name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile Python files
        shell: bash
        run: |
          python -m compileall \
            omnimem/ \
            tests/ \
            benchmarks/

      - name: Validate shell setup scripts
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bash -n scripts/setup.sh
          bash -n scripts/omnimem

      - name: Install minimal test dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Run unit tests
        env:
          PYTHONIOENCODING: utf-8
        run: python -m unittest discover -s tests -v

      - name: Install packaging tool
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build

      - name: Smoke test installed console entry point
        shell: bash
        run: |
          python -m venv .pkg-smoke
          if [ -f .pkg-smoke/bin/python ]; then
            VENV_BIN=$(cd .pkg-smoke/bin && pwd)
          else
            VENV_BIN=$(cd .pkg-smoke/Scripts && pwd)
          fi
          # Put the venv on PATH so the heredoc's `omnimem` lookup hits the
          # newly-installed entry point (we never `source activate` because
          # that script differs between bash / pwsh / cmd).
          export PATH="$VENV_BIN:$PATH"
          python -m pip install --upgrade pip
          WHEEL=$(ls dist/*.whl | head -n 1)
          python -m pip install --no-deps "$WHEEL"
          omnimem --version
          python - <<'PY'
          import json
          import subprocess

          result = subprocess.run(
              ["omnimem", "update", "--check", "--json"],
              text=True,
              capture_output=True,
              check=True,
          )
          payload = json.loads(result.stdout)
          assert payload["status"] == "unsupported_install_mode", payload
          assert payload["install_mode"] == "package_install", payload
          PY
