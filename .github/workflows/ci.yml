name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Compile Python files
        run: |
          python -m compileall \
            omnimem.py \
            omni_add.py \
            omni_search.py \
            omni_import.py \
            omni_del.py \
            omni_bootstrap.py \
            omni_doctor.py \
            omni_metadata.py \
            omni_paths.py \
            omni_update.py \
            omni_version.py \
            omni_init.py \
            omni_mcp.py \
            omni_note.py \
            omni_note_index.py \
            omni_vault.py \
            omni_codemap.py \
            omni_hooks.py \
            omni_canvas.py \
            omni_redact.py \
            benchmarks/__init__.py \
            benchmarks/common.py \
            benchmarks/bench_codemap_accuracy.py \
            benchmarks/bench_latency.py \
            benchmarks/bench_retrieval.py \
            benchmarks/run_all.py

      - name: Validate shell setup script
        run: |
          bash -n setup.sh
          bash -n omnimem

      - name: Install minimal test dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Install packaging tool
        run: python -m pip install --upgrade pip build

      - name: Build package
        run: python -m build

      - name: Smoke test installed console entry point
        run: |
          python -m venv .pkg-smoke
          . .pkg-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install --no-deps dist/*.whl
          omnimem --version
          python - <<'PY'
          import json
          import subprocess

          result = subprocess.run(
              ["omnimem", "update", "--check", "--json"],
              text=True,
              capture_output=True,
              check=True,
          )
          payload = json.loads(result.stdout)
          assert payload["status"] == "unsupported_install_mode", payload
          assert payload["install_mode"] == "package_install", payload
          PY
